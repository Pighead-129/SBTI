let current = 'all';

function filter(group) {
  current = group;
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.classList.toggle('active', btn.textContent === (group === 'all' ? '全部人格' : group));
  });
  render();
}

function render() {
  const filtered = current === 'all' ? data : data.filter(d => d.group === current);
  const container = document.getElementById('cards-container');
  container.innerHTML = filtered.map(d => {
    const allDest = [
      ...d.best.map(x => `<span class="dest-tag best">${x} ★</span>`),
      ...d.good.map(x => `<span class="dest-tag good">${x}</span>`),
      ...d.caution.map(x => `<span class="dest-tag caution">${x} ⚠</span>`),
      ...d.avoid.map(x => `<span class="dest-tag avoid">${x} ✕</span>`)
    ].join('');
    const groupColors = {
      '摆烂躺平组': 'background:#D3D1C7;color:#444441',
      '情绪内耗组': 'background:#F5C4B3;color:#993C1D',
      '人间清醒组': 'background:#CED9F6;color:#3C3489',
      '社交个性组': 'background:#C0DD97;color:#27500A'
    };
    return `
    <div class="card">
      <div class="card-header">
        <div class="avatar" style="background:${d.color};color:${d.textColor}">${d.id}</div>
        <div class="card-meta">
          <div class="card-name">${d.name}</div>
          <div class="card-desc">${d.desc}</div>
          <span class="group-badge" style="${groupColors[d.group]}">${d.group}</span>
        </div>
      </div>
      <p class="section-title">推荐留学目的地</p>
      <div class="destinations">${allDest}</div>
      <div class="reason">${d.reason}</div>
    </div>`;
  }).join('');
}
