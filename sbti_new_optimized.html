<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="format-detection" content="telephone=no">
  <title>留学目的地推荐 - SBTI人格匹配</title>

    /* 全局样式重置与基础变量 */
    * { 
      box-sizing: border-box; 
      margin: 0; 
      padding: 0; 
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    :root {
      --primary: #FF6B6B;
      --primary-light: #FF8E8E;
      --primary-dark: #E74C3C;
      --secondary: #4ECDC4;
      --accent: #FFE66D;
      --dark: #2C3E50;
      --light: #FAFAFA;
      --gray: #95A5A6;
      --gray-light: #E0E0E0;
      --gray-dark: #666;
      --success: #2E7D32;
      --info: #1565C0;
      --warning: #E65100;
      --danger: #C62828;
      --shadow-sm: 0 2px 8px rgba(0,0,0,0.08);
      --shadow-md: 0 4px 16px rgba(0,0,0,0.12);
      --shadow-lg: 0 8px 24px rgba(0,0,0,0.16);
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-xl: 20px;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, #FFF5F5 0%, #FFF9E6 100%);
      min-height: 100vh;
      color: var(--dark);
      line-height: 1.6;
      padding: 16px 0;
    }
    /* 容器样式 */
    .container {
      max-width: 420px;
      margin: 0 auto;
      padding: 20px;
      background: #FFFFFF;
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-md);
    }
    @media (min-width: 768px) {
      .container {
        max-width: 600px;
        margin: 24px auto;
        padding: 24px;
      }
    }
    @media (min-width: 1024px) {
      .container {
        max-width: 800px;
      }
    }
    /* 头部样式 */
    .header {
      text-align: center;
      padding: 8px 0 20px;
      border-bottom: 2px solid #FFE5E5;
      margin-bottom: 20px;
    }
    .brand {
      display: inline-block;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: white;
      padding: 6px 16px;
      border-radius: var(--radius-md);
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 12px;
      box-shadow: 0 2px 8px rgba(255, 107, 107, 0.3);
    }
    .header h1 {
      font-size: 22px;
      font-weight: 700;
      color: var(--primary-dark);
      margin-bottom: 8px;
      letter-spacing: 0.5px;
    }
    .header p {
      font-size: 13px;
      color: var(--gray);
    }
    /* 标签栏样式 */
    .tab-bar {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }
    .tab-btn {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid var(--gray-light);
      border-radius: var(--radius-md);
      background: var(--light);
      font-size: 14px;
      font-weight: 500;
      color: var(--gray-dark);
      cursor: pointer;
      text-align: center;
    }
    .tab-btn.active {
      background: var(--primary-dark);
      border-color: var(--primary-dark);
      color: #FFF;
      box-shadow: 0 2px 8px rgba(231, 76, 60, 0.2);
    }
    .tab-btn:hover:not(.active) {
      background: #FFF5F5;
      border-color: #FFCCCB;
    }
    .tab-content {
      display: none;
    }
    .tab-content.active {
      display: block;
      animation: fadeIn 0.3s ease;
    }
    /* 搜索框样式 */
    .search-box {
      background: var(--light);
      border-radius: var(--radius-lg);
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: inset 0 1px 3px rgba(0,0,0,0.05);
    }
    .search-box label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: var(--dark);
      margin-bottom: 10px;
    }
    .search-box input {
      width: 100%;
      padding: 14px 18px;
      border: 1px solid var(--gray-light);
      border-radius: var(--radius-md);
      font-size: 15px;
      outline: none;
      background: #FFFFFF;
    }
    .search-box input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(255, 107, 107, 0.1);
    }
    .search-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--primary-dark), var(--primary));
      color: white;
      border: none;
      border-radius: var(--radius-md);
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 14px;
      box-shadow: 0 4px 12px rgba(231, 76, 60, 0.2);
    }
    .search-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(231, 76, 60, 0.3);
    }
    .search-btn:active {
      transform: translateY(0);
    }
    /* 结果卡片样式 */
    .result-card {
      background: #FFFFFF;
      border: 1px solid var(--gray-light);
      border-radius: var(--radius-lg);
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: var(--shadow-sm);
    }
    .result-card:hover {
      box-shadow: var(--shadow-md);
      transform: translateY(-2px);
    }
    .result-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 16px;
    }
    .avatar {
      width: 56px;
      height: 56px;
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      flex-shrink: 0;
      text-align: center;
      line-height: 1.3;
      box-shadow: var(--shadow-sm);
    }
    .result-meta {
      flex: 1;
      min-width: 0;
    }
    .result-name {
      font-size: 18px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 4px;
    }
    .result-desc {
      font-size: 13px;
      color: var(--gray);
      margin-bottom: 6px;
    }
    .group-badge {
      font-size: 11px;
      padding: 3px 10px;
      border-radius: var(--radius-sm);
      font-weight: 600;
      display: inline-block;
      margin-top: 4px;
    }
    /* 目的地标签样式 */
    .destinations {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 16px;
    }
    .dest-tag {
      font-size: 12px;
      padding: 5px 12px;
      border-radius: var(--radius-sm);
      font-weight: 500;
    }
    .best { background: #E8F5E9; color: var(--success); }
    .good { background: #E3F2FD; color: var(--info); }
    .caution { background: #FFF3E0; color: var(--warning); }
    .avoid { background: #FFEBEE; color: var(--danger); }
    /* 理由说明样式 */
    .reason {
      font-size: 14px;
      color: var(--gray-dark);
      line-height: 1.8;
      background: var(--light);
      padding: 14px;
      border-radius: var(--radius-md);
      border-left: 4px solid var(--primary-light);
    }
    /* 国家查询相关样式 */
    .country-result {
      margin-bottom: 20px;
    }
    .country-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--dark);
      margin-bottom: 12px;
      padding-bottom: 10px;
      border-bottom: 1px dashed var(--gray-light);
    }
    .country-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .country-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 12px;
      background: var(--light);
      border-radius: var(--radius-md);
    }
    .country-item:hover {
      background: #FFF5F5;
    }
    .country-avatar {
      width: 44px;
      height: 44px;
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 700;
      flex-shrink: 0;
    }
    .country-info {
      flex: 1;
    }
    .country-name {
      font-size: 15px;
      font-weight: 600;
      color: var(--dark);
      margin-bottom: 4px;
    }
    .country-reason {
      font-size: 13px;
      color: var(--gray-dark);
      line-height: 1.6;
    }
    /* 图例样式 */
    .legend {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 20px;
      justify-content: center;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      color: var(--gray-dark);
      background: var(--light);
      padding: 6px 12px;
      border-radius: var(--radius-sm);
    }
    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }
    /* 空状态样式 */
    .empty-result {
      text-align: center;
      padding: 60px 20px;
      color: var(--gray);
    }
    .empty-result i {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.5;
    }
    .empty-result p {
      font-size: 15px;
      margin-top: 12px;
      line-height: 1.8;
    }
    /* 页脚样式 */
    .footer {
      text-align: center;
      padding: 30px 0 10px;
      font-size: 12px;
      color: var(--gray);
    }
    /* 动画效果 */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    /* 加载状态 */
    .loading {
      text-align: center;
      padding: 40px 20px;
      color: var(--gray);
    }
    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 4px solid var(--gray-light);
      border-top: 4px solid var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>

  </div>

    // 切换标签页
    function switchTab(tabName) {
      // 隐藏所有标签内容
      document.querySelectorAll('.tab-content').forEach(el => {
        el.classList.remove('active');
      });
      // 取消所有标签按钮激活状态
      document.querySelectorAll('.tab-btn').forEach(el => {
        el.classList.remove('active');
      });
      // 激活目标标签
      document.getElementById(`${tabName}-tab`).classList.add('active');
      event.target.classList.add('active');
      // 清空结果
      if (tabName === 'sbti') {
        document.getElementById('sbti-result').innerHTML = '';
      } else {
        document.getElementById('country-result').innerHTML = '';
      }
    }

    // 按SBTI人格查询
    function searchBySbti() {
      const inputVal = document.getElementById('sbti-input').value.trim().toUpperCase();
      const resultContainer = document.getElementById('sbti-result');
      
      // 清空结果
      resultContainer.innerHTML = '';
      
      // 验证输入
      if (!inputVal) {
        resultContainer.innerHTML = `
          <div class="empty-result">
            <p>请输入有效的SBTI人格代码（如：DEAD、MALO）</p>
          </div>
        `;
        return;
      }
      
      // 显示加载状态
      resultContainer.innerHTML = `
        <div class="loading">
          <div class="loading-spinner"></div>
          <p>正在查询...</p>
        </div>
      `;
      
      // 模拟加载延迟
      setTimeout(() => {
        // 查找匹配数据
        const matchData = sbtiData.find(item => item.id === inputVal);
        
        if (matchData) {
          // 构建结果卡片
          let tagsHtml = '';
          // 强烈推荐
          matchData.best.forEach(item => {
            tagsHtml += `<span class="dest-tag best">${item}</span>`;
          });
          // 适合
          matchData.good.forEach(item => {
            tagsHtml += `<span class="dest-tag good">${item}</span>`;
          });
          // 谨慎考虑
          matchData.caution.forEach(item => {
            tagsHtml += `<span class="dest-tag caution">${item}</span>`;
          });
          // 不建议
          matchData.avoid.forEach(item => {
            tagsHtml += `<span class="dest-tag avoid">${item}</span>`;
          });
          
          // 构建分组徽章样式
          const groupBadgeStyle = `background: ${matchData.groupColor}; color: ${matchData.groupTextColor};`;
          
          resultContainer.innerHTML = `
            <div class="result-card">
              <div class="result-header">
                <div class="avatar" style="background: ${matchData.color}; color: ${matchData.textColor};">${matchData.id}</div>
                <div class="result-meta">
                  <div class="result-name">${matchData.name}</div>
                  <div class="result-desc">${matchData.desc}</div>
                  <span class="group-badge" style="${groupBadgeStyle}">${matchData.group}</span>
                </div>
              </div>
              <div class="destinations">
                ${tagsHtml}
              </div>
              <div class="reason">${matchData.reason}</div>
            </div>
          `;
        } else {
          // 无匹配结果
          resultContainer.innerHTML = `
            <div class="empty-result">
              <p>未找到「${inputVal}」相关的SBTI人格数据</p>
              <p style="margin-top:8px; font-size:13px;">支持查询的人格代码：${sbtiData.map(item => item.id).join('、')}</p>
            </div>
          `;
        }
      }, 500);
    }

                  <div class="country-info">
                    <div class="country-name">不适合的人格类型</div>
                    <div class="country-reason">${unsuitableHtml}</div>
                  </div>
                </div>
                <div class="country-item">
                  <div class="country-avatar" style="background: #F5F5F5; color: #666;">理由</div>
                  <div class="country-info">
                    <div class="country-name">综合评价</div>
                    <div class="country-reason">${matchData.reason}</div>
                  </div>
                </div>
              </div>
            </div>
          `;
        } else {
          // 无匹配结果
          resultContainer.innerHTML = `
            <div class="empty-result">
              <p>未找到「${inputVal}」相关的留学推荐数据</p>
              <p style="margin-top:8px; font-size:13px;">支持查询的国家：${Object.keys(countryData).join('、')}</p>
            </div>
          `;
        }
      }, 500);
    }

    // 初始化页面
    document.addEventListener('DOMContentLoaded', function() {
      // 给输入框添加回车触发查询
      document.getElementById('sbti-input').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') searchBySbti();
      });
      document.getElementById('country-input').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') searchByCountry();
      });
    });
  </script>
</body>
</html>
