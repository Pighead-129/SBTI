<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="format-detection" content="telephone=no">
  <title>留学目的地推荐 - SBTI人格匹配</title>
  <style>
    /* 全局样式重置与基础变量 */
    * { 
      box-sizing: border-box; 
      margin: 0; 
      padding: 0; 
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    :root {
      --primary: #FF6B6B;
      --primary-light: #FF8E8E;
      --primary-dark: #E74C3C;
      --secondary: #4ECDC4;
      --accent: #FFE66D;
      --dark: #2C3E50;
      --light: #FAFAFA;
      --gray: #95A5A6;
      --gray-light: #E0E0E0;
      --gray-dark: #666;
      --success: #2E7D32;
      --info: #1565C0;
      --warning: #E65100;
      --danger: #C62828;
      --shadow-sm: 0 2px 8px rgba(0,0,0,0.08);
      --shadow-md: 0 4px 16px rgba(0,0,0,0.12);
      --shadow-lg: 0 8px 24px rgba(0,0,0,0.16);
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-xl: 20px;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, #FFF5F5 0%, #FFF9E6 100%);
      min-height: 100vh;
      color: var(--dark);
      line-height: 1.6;
      padding: 16px 0;
    }
    /* 容器样式 */
    .container {
      max-width: 420px;
      margin: 0 auto;
      padding: 20px;
      background: #FFFFFF;
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-md);
    }
    @media (min-width: 768px) {
      .container {
        max-width: 600px;
        margin: 24px auto;
        padding: 24px;
      }
    }
    @media (min-width: 1024px) {
      .container {
        max-width: 800px;
      }
    }
    /* 头部样式 */
    .header {
      text-align: center;
      padding: 8px 0 20px;
      border-bottom: 2px solid #FFE5E5;
      margin-bottom: 20px;
    }
    .brand {
      display: inline-block;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: white;
      padding: 6px 16px;
      border-radius: var(--radius-md);
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 12px;
      box-shadow: 0 2px 8px rgba(255, 107, 107, 0.3);
    }
    .header h1 {
      font-size: 22px;
      font-weight: 700;
      color: var(--primary-dark);
      margin-bottom: 8px;
      letter-spacing: 0.5px;
    }
    .header p {
      font-size: 13px;
      color: var(--gray);
    }
    /* 标签栏样式 */
    .tab-bar {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }
    .tab-btn {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid var(--gray-light);
      border-radius: var(--radius-md);
      background: var(--light);
      font-size: 14px;
      font-weight: 500;
      color: var(--gray-dark);
      cursor: pointer;
      text-align: center;
    }
    .tab-btn.active {
      background: var(--primary-dark);
      border-color: var(--primary-dark);
      color: #FFF;
      box-shadow: 0 2px 8px rgba(231, 76, 60, 0.2);
    }
    .tab-btn:hover:not(.active) {
      background: #FFF5F5;
      border-color: #FFCCCB;
    }
    .tab-content {
      display: none;
    }
    .tab-content.active {
      display: block;
      animation: fadeIn 0.3s ease;
    }
    /* 搜索框样式 */
    .search-box {
      background: var(--light);
      border-radius: var(--radius-lg);
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: inset 0 1px 3px rgba(0,0,0,0.05);
    }
    .search-box label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: var(--dark);
      margin-bottom: 10px;
    }
    .search-box input {
      width: 100%;
      padding: 14px 18px;
      border: 1px solid var(--gray-light);
      border-radius: var(--radius-md);
      font-size: 15px;
      outline: none;
      background: #FFFFFF;
    }
    .search-box input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(255, 107, 107, 0.1);
    }
    .search-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--primary-dark), var(--primary));
      color: white;
      border: none;
      border-radius: var(--radius-md);
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 14px;
      box-shadow: 0 4px 12px rgba(231, 76, 60, 0.2);
    }
    .search-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(231, 76, 60, 0.3);
    }
    .search-btn:active {
      transform: translateY(0);
    }
    /* 结果卡片样式 */
    .result-card {
      background: #FFFFFF;
      border: 1px solid var(--gray-light);
      border-radius: var(--radius-lg);
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: var(--shadow-sm);
    }
    .result-card:hover {
      box-shadow: var(--shadow-md);
      transform: translateY(-2px);
    }
    .result-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 16px;
    }
    .avatar {
      width: 56px;
      height: 56px;
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      flex-shrink: 0;
      text-align: center;
      line-height: 1.3;
      box-shadow: var(--shadow-sm);
    }
    .result-meta {
      flex: 1;
      min-width: 0;
    }
    .result-name {
      font-size: 18px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 4px;
    }
    .result-desc {
      font-size: 13px;
      color: var(--gray);
      margin-bottom: 6px;
    }
    .group-badge {
      font-size: 11px;
      padding: 3px 10px;
      border-radius: var(--radius-sm);
      font-weight: 600;
      display: inline-block;
      margin-top: 4px;
    }
    /* 目的地标签样式 */
    .destinations {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 16px;
    }
    .dest-tag {
      font-size: 12px;
      padding: 5px 12px;
      border-radius: var(--radius-sm);
      font-weight: 500;
    }
    .best { background: #E8F5E9; color: var(--success); }
    .good { background: #E3F2FD; color: var(--info); }
    .caution { background: #FFF3E0; color: var(--warning); }
    .avoid { background: #FFEBEE; color: var(--danger); }
    /* 理由说明样式 */
    .reason {
      font-size: 14px;
      color: var(--gray-dark);
      line-height: 1.8;
      background: var(--light);
      padding: 14px;
      border-radius: var(--radius-md);
      border-left: 4px solid var(--primary-light);
    }
    /* 国家查询相关样式 */
    .country-result {
      margin-bottom: 20px;
    }
    .country-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--dark);
      margin-bottom: 12px;
      padding-bottom: 10px;
      border-bottom: 1px dashed var(--gray-light);
    }
    .country-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .country-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 12px;
      background: var(--light);
      border-radius: var(--radius-md);
    }
    .country-item:hover {
      background: #FFF5F5;
    }
    .country-avatar {
      width: 44px;
      height: 44px;
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 700;
      flex-shrink: 0;
    }
    .country-info {
      flex: 1;
    }
    .country-name {
      font-size: 15px;
      font-weight: 600;
      color: var(--dark);
      margin-bottom: 4px;
    }
    .country-reason {
      font-size: 13px;
      color: var(--gray-dark);
      line-height: 1.6;
    }
    /* 图例样式 */
    .legend {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 20px;
      justify-content: center;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      color: var(--gray-dark);
      background: var(--light);
      padding: 6px 12px;
      border-radius: var(--radius-sm);
    }
    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }
    /* 空状态样式 */
    .empty-result {
      text-align: center;
      padding: 60px 20px;
      color: var(--gray);
    }
    .empty-result i {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.5;
    }
    .empty-result p {
      font-size: 15px;
      margin-top: 12px;
      line-height: 1.8;
    }
    /* 页脚样式 */
    .footer {
      text-align: center;
      padding: 30px 0 10px;
      font-size: 12px;
      color: var(--gray);
    }
    /* 动画效果 */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    /* 加载状态 */
    .loading {
      text-align: center;
      padding: 40px 20px;
      color: var(--gray);
    }
    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 4px solid var(--gray-light);
      border-top: 4px solid var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    /* 详情弹窗样式 */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 1000;
      justify-content: center;
      align-items: flex-start;
      padding: 20px;
      overflow-y: auto;
    }
    .modal-overlay.active {
      display: flex;
    }
    .modal-content {
      width: 100%;
      max-width: 500px;
      background: #FFFFFF;
      border-radius: var(--radius-xl);
      overflow: hidden;
      box-shadow: var(--shadow-lg);
      animation: slideUp 0.3s ease;
      position: relative;
      margin-top: 50px;
    }
    .modal-header {
      padding: 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      position: relative;
    }
    .modal-close {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 32px;
      height: 32px;
      border: none;
      background: rgba(0,0,0,0.05);
      border-radius: 50%;
      font-size: 20px;
      cursor: pointer;
      color: var(--gray);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .modal-close:hover {
      background: rgba(0,0,0,0.1);
    }
    .modal-avatar {
      width: 72px;
      height: 72px;
      border-radius: var(--radius-lg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 700;
      text-align: center;
      line-height: 1.3;
      box-shadow: var(--shadow-md);
    }
    .modal-title {
      font-size: 22px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 4px;
    }
    .modal-desc {
      font-size: 14px;
      color: var(--gray);
      margin-bottom: 6px;
    }
    .modal-group {
      font-size: 11px;
      padding: 3px 10px;
      border-radius: var(--radius-sm);
      font-weight: 600;
    }
    .modal-body {
      padding: 0 24px 24px;
    }
    .modal-section {
      margin-bottom: 20px;
    }
    .section-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--dark);
      margin-bottom: 10px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--gray-light);
    }
    .section-text {
      font-size: 14px;
      color: var(--gray-dark);
      line-height: 1.8;
    }
    .character-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .character-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 0;
      border-bottom: 1px dashed var(--gray-light);
    }
    .character-item:last-child {
      border-bottom: none;
    }
    .character-icon {
      width: 20px;
      height: 20px;
      background: var(--success);
      color: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      flex-shrink: 0;
    }
    .character-text {
      font-size: 13px;
      color: var(--gray-dark);
    }
    .tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .tag-item {
      font-size: 12px;
      padding: 5px 12px;
      border-radius: var(--radius-sm);
      font-weight: 500;
    }
    .tag-item.good {
      background: #E3F2FD;
      color: var(--info);
    }
    .detail-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }
    .detail-item {
      background: var(--light);
      padding: 12px;
      border-radius: var(--radius-md);
    }
    .detail-label {
      font-size: 12px;
      color: var(--gray);
      margin-bottom: 4px;
    }
    .detail-value {
      font-size: 13px;
      font-weight: 600;
    }
    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    /* 卡片点击效果 */
    .result-card {
      cursor: pointer;
      position: relative;
    }
    .result-card::after {
      content: '查看详情 →';
      position: absolute;
      bottom: 16px;
      right: 16px;
      font-size: 12px;
      color: var(--primary);
      opacity: 0;
      transition: opacity 0.3s;
    }
    .result-card:hover::after {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="brand">小鱼碎碎念原创</div>
      <h1>🌍 留学目的地推荐</h1>
      <p>根据SBTI人格类型，找到最适合的留学国家</p>

    <div class="tab-bar">
      <button class="tab-btn active" onclick="switchTab('sbti')">按人格查询</button>
      <button class="tab-btn" onclick="switchTab('country')">按国家查询</button>
    </div>

    <!-- 按人格查询标签页 -->
    <div id="sbti-tab" class="tab-content active">
      <div class="search-box">

        <input type="text" id="sbti-input" placeholder="请输入SBTI代码..." maxlength="10">
        <button class="search-btn" onclick="searchBySbti()">查询</button>
      </div>
      <div id="sbti-result"></div>
    </div>

    <!-- 按国家查询标签页 -->
    <div id="country-tab" class="tab-content">
      <div class="search-box">

        <button class="search-btn" onclick="searchByCountry()">查询</button>

      <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:var(--success);"></div>强烈推荐</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--info);"></div>适合</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--warning);"></div>谨慎考虑</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--danger);"></div>不建议</div>
      </div>
      <div id="country-result"></div>
    </div>

    <div class="footer">
      <div class="brand">小鱼碎碎念原创</div>
      <p>SBTI 人格留学指南 © 2026</p>
    </div>

    <!-- 详情弹窗 -->
    <div class="modal-overlay" id="detail-modal">
      <div class="modal-content">
        <div class="modal-header" id="modal-header">
          <button class="modal-close" onclick="closeModal()">×</button>
          <div class="modal-avatar" id="modal-avatar"></div>
          <div>
            <div class="modal-title" id="modal-title"></div>
            <div class="modal-desc" id="modal-desc"></div>
            <span class="modal-group" id="modal-group"></span>
          </div>
        </div>
        <div class="modal-body" id="modal-body"></div>
      </div>
    </div>
  </div>

    reason: "文化热情开放，社交氛围浓厚，适配社牛/社交达人的性格",
    suitable: ["STAR", "SNZH", "XGG", "HHHH", "SEXY"],
    unsuitable: ["JLGU", "MGJN", "TPGU", "THIN-K", "SOLO"]
  }
};

    // 切换标签页
    function switchTab(tabName) {
      // 隐藏所有标签内容
      document.querySelectorAll('.tab-content').forEach(el => {
        el.classList.remove('active');
      });
      // 取消所有标签按钮激活状态
      document.querySelectorAll('.tab-btn').forEach(el => {
        el.classList.remove('active');
      });
      // 激活目标标签
      document.getElementById(`${tabName}-tab`).classList.add('active');
      event.target.classList.add('active');
      // 清空结果
      if (tabName === 'sbti') {
        document.getElementById('sbti-result').innerHTML = '';
      } else {
        document.getElementById('country-result').innerHTML = '';
      }
    }

    // 按SBTI人格查询
    function searchBySbti() {
      const inputVal = document.getElementById('sbti-input').value.trim();
      const resultContainer = document.getElementById('sbti-result');
      
      // 清空结果
      resultContainer.innerHTML = '';
      
      // 验证输入
      if (!inputVal) {
        resultContainer.innerHTML = `
          <div class="empty-result">
            <p>请输入有效的SBTI人格代码（如：DEAD、MALO）</p>
          </div>
        `;
        return;
      }
      
      // 显示加载状态
      resultContainer.innerHTML = `
        <div class="loading">
          <div class="loading-spinner"></div>
          <p>正在查询...</p>
        </div>
      `;
      
      // 模拟加载延迟
      setTimeout(() => {
        try {
          // 查找匹配数据（支持ID和名称匹配，不区分大小写）
          const inputUpper = inputVal.toUpperCase();
          const matchData = sbtiData.find(item => 
            item.id.toUpperCase() === inputUpper || 
            item.id === inputVal ||
            item.name.toUpperCase().includes(inputUpper)
          );
          
          if (matchData) {
            // 构建结果卡片
            let tagsHtml = '';
            // 强烈推荐
            matchData.best.forEach(item => {
              tagsHtml += `<span class="dest-tag best">${item}</span>`;
            });
            // 适合
            matchData.good.forEach(item => {
              tagsHtml += `<span class="dest-tag good">${item}</span>`;
            });
            // 谨慎考虑
            matchData.caution.forEach(item => {
              tagsHtml += `<span class="dest-tag caution">${item}</span>`;
            });
            // 不建议
            matchData.avoid.forEach(item => {
              tagsHtml += `<span class="dest-tag avoid">${item}</span>`;
            });
            
            // 构建分组徽章样式
            const groupBadgeStyle = `background: ${matchData.groupColor}; color: ${matchData.groupTextColor};`;
            
            // 创建卡片元素并绑定点击事件
            const card = document.createElement('div');
            card.className = 'result-card';
            card.innerHTML = `
              <div class="result-header">
                <div class="avatar" style="background: ${matchData.color}; color: ${matchData.textColor};">${matchData.id}</div>
                <div class="result-meta">
                  <div class="result-name">${matchData.name}</div>
                  <div class="result-desc">${matchData.desc}</div>
                  <span class="group-badge" style="${groupBadgeStyle}">${matchData.group}</span>
                </div>
              </div>
              <div class="destinations">
                ${tagsHtml}
              </div>
              <div class="reason">${matchData.reason}</div>
            `;
            
            // 添加点击事件
            card.addEventListener('click', function() {
              openModal(matchData.id);
            });
            
            resultContainer.innerHTML = '';
            resultContainer.appendChild(card);
          } else {
            // 无匹配结果
            resultContainer.innerHTML = `
              <div class="empty-result">
                <p>未找到「${inputVal}」相关的SBTI人格数据</p>
                <p style="margin-top:8px; font-size:13px;">支持查询的人格代码：${sbtiData.map(item => item.id).join('、')}</p>
              </div>
            `;
          }
        } catch (error) {
          console.error('搜索出错:', error);
          resultContainer.innerHTML = `
            <div class="empty-result">
              <p>查询过程中出现错误，请重试</p>
            </div>
          `;
        }
      }, 500);
    }

    // 按国家查询
    function searchByCountry() {
      const inputVal = document.getElementById('country-input').value.trim();
      const resultContainer = document.getElementById('country-result');
      
      // 清空结果
      resultContainer.innerHTML = '';
      
      // 验证输入
      if (!inputVal) {
        resultContainer.innerHTML = `
          <div class="empty-result">
            <p>请输入有效的国家名称（如：美国、英国、澳大利亚）</p>
          </div>
        `;
        return;
      }
      
      // 显示加载状态
      resultContainer.innerHTML = `
        <div class="loading">
          <div class="loading-spinner"></div>
          <p>正在查询...</p>
        </div>
      `;
      
      // 模拟加载延迟
      setTimeout(() => {
        // 查找匹配数据
        const matchData = countryData[inputVal];
        
        if (matchData) {
          // 构建级别样式
          let levelClass = '';
          let levelText = '';
          switch(matchData.level) {
            case 'best':
              levelClass = 'best';
              levelText = '强烈推荐';
              break;
            case 'good':
              levelClass = 'good';
              levelText = '适合';
              break;
            case 'caution':
              levelClass = 'caution';
              levelText = '谨慎考虑';
              break;
            case 'avoid':
              levelClass = 'avoid';
              levelText = '不建议';
              break;
          }
          
          // 构建适合/不适合的人格列表
          let suitableHtml = matchData.suitable[0] === "无" ? "无" : matchData.suitable.join('、');
          let unsuitableHtml = matchData.unsuitable[0] === "无" ? "无" : matchData.unsuitable.join('、');
          
          resultContainer.innerHTML = `
            <div class="country-result">
              <div class="country-title">
                ${inputVal} <span class="dest-tag ${levelClass}">${levelText}</span>
              </div>
              <div class="country-list">
                <div class="country-item">
                  <div class="country-avatar" style="background: #E8F5E9; color: #2E7D32;">适合</div>
                  <div class="country-info">
                    <div class="country-name">适合的人格类型</div>
                    <div class="country-reason">${suitableHtml}</div>
                  </div>
                </div>
                <div class="country-item">
                  <div class="country-avatar" style="background: #FFEBEE; color: #C62828;">不适合</div>
                  <div class="country-info">
                    <div class="country-name">不适合的人格类型</div>
                    <div class="country-reason">${unsuitableHtml}</div>
                  </div>
                </div>
                <div class="country-item">
                  <div class="country-avatar" style="background: #F5F5F5; color: #666;">理由</div>
                  <div class="country-info">
                    <div class="country-name">综合评价</div>
                    <div class="country-reason">${matchData.reason}</div>
                  </div>
                </div>
              </div>
            </div>
          `;
        } else {
          // 无匹配结果
          resultContainer.innerHTML = `
            <div class="empty-result">
              <p>未找到「${inputVal}」相关的留学推荐数据</p>
              <p style="margin-top:8px; font-size:13px;">支持查询的国家：${Object.keys(countryData).join('、')}</p>
            </div>
          `;
        }
      }, 500);
    }

    // 打开详情弹窗
    function openModal(personalityId) {
      const item = sbtiData.find(p => p.id === personalityId);
      if (!item) return;
      
      // 设置弹窗头部
      document.getElementById('modal-avatar').style.cssText = `background: ${item.color}; color: ${item.textColor};`;
      document.getElementById('modal-avatar').textContent = item.id;
      document.getElementById('modal-title').textContent = item.name;
      document.getElementById('modal-desc').textContent = item.desc;
      document.getElementById('modal-group').style.cssText = `background: ${item.groupColor}; color: ${item.groupTextColor};`;
      document.getElementById('modal-group').textContent = item.group;
      
      // 设置弹窗内容
      const bodyHtml = `
        <div class="modal-section">
          <div class="section-title">性格特点</div>
          <ul class="character-list">
            ${item.personality ? item.personality.map(p => `<li class="character-item"><span class="character-icon">✓</span><span class="character-text">${p}</span></li>`).join('') : '<li class="character-item"><span class="character-text">暂无详细信息</span></li>'}
          </ul>
        </div>
        
        <div class="modal-section">
          <div class="section-title">留学建议</div>
          <div class="section-text">${item.studyTips || '暂无详细信息'}</div>
        </div>
        
        <div class="modal-section">
          <div class="section-title">生活建议</div>
          <div class="section-text">${item.lifeTips || '暂无详细信息'}</div>
        </div>
        
        <div class="modal-section">
          <div class="section-title">职业建议</div>
          <div class="section-text">${item.careerTips || '暂无详细信息'}</div>
        </div>
        
        <div class="modal-section">
          <div class="section-title">适合专业</div>
          <div class="tag-list">
            ${item.majors ? item.majors.map(m => `<span class="tag-item good">${m}</span>`).join('') : '<span class="tag-item good">暂无推荐</span>'}
          </div>
        </div>
        
        <div class="modal-section">
          <div class="section-title">有趣小知识</div>
          <div class="section-text">${item.funFact || '暂无详细信息'}</div>
        </div>
        
        <div class="modal-section">
          <div class="section-title">推荐目的地</div>
          <div class="detail-grid">
            <div class="detail-item">
              <div class="detail-label">强烈推荐</div>
              <div class="detail-value" style="color: var(--success);">${item.best.join('、')}</div>
            </div>
            <div class="detail-item">
              <div class="detail-label">适合</div>
              <div class="detail-value" style="color: var(--info);">${item.good.join('、')}</div>
            </div>
            <div class="detail-item">
              <div class="detail-label">谨慎考虑</div>
              <div class="detail-value" style="color: var(--warning);">${item.caution.join('、')}</div>
            </div>
            <div class="detail-item">
              <div class="detail-label">不建议</div>
              <div class="detail-value" style="color: var(--danger);">${item.avoid.join('、')}</div>
            </div>
          </div>
        </div>
        
        <div class="modal-section">
          <div class="section-title">匹配理由</div>
          <div class="section-text">${item.reason}</div>
        </div>
      `;
      
      document.getElementById('modal-body').innerHTML = bodyHtml;
      document.getElementById('detail-modal').classList.add('active');
      document.body.style.overflow = 'hidden';
    }
    
    // 关闭详情弹窗
    function closeModal() {
      document.getElementById('detail-modal').classList.remove('active');
      document.body.style.overflow = '';
    }
    
    // 点击弹窗外部关闭
    document.getElementById('detail-modal').addEventListener('click', function(e) {
      if (e.target === this) {
        closeModal();
      }
    });
    
    // 初始化页面
    document.addEventListener('DOMContentLoaded', function() {
      // 给输入框添加回车触发查询
      document.getElementById('sbti-input').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') searchBySbti();
      });
      document.getElementById('country-input').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') searchByCountry();
      });
    });
  </script>
</body>
</html>
