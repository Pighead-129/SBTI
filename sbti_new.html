<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="format-detection" content="telephone=no">
  <title>留学目的地推荐 - SBTI人格匹配</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #FF6B6B;
      --secondary: #4ECDC4;
      --accent: #FFE66D;
      --dark: #2C3E50;
      --light: #FAFAFA;
      --gray: #95A5A6;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, #FFF5F5 0%, #FFF9E6 100%);
      min-height: 100vh;
      color: var(--dark);
      line-height: 1.6;
    }
    .container {
      max-width: 420px;
      margin: 0 auto;
      padding: 16px;
      background: #FFFFFF;
      min-height: 100vh;
      box-shadow: 0 0 30px rgba(0,0,0,0.08);
    }
    .header {
      text-align: center;
      padding: 16px 0 20px;
      border-bottom: 2px solid #FFE5E5;
      margin-bottom: 16px;
    }
    .header h1 {
      font-size: 20px;
      font-weight: 700;
      color: #E74C3C;
      margin-bottom: 4px;
    }
    .header p {
      font-size: 12px;
      color: #95A5A6;
    }
    .brand {
      display: inline-block;
      background: linear-gradient(135deg, #FF6B6B, #FF8E8E);
      color: white;
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .tab-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }
    .tab-btn {
      flex: 1;
      padding: 10px 12px;
      border: 1px solid #E0E0E0;
      border-radius: 12px;
      background: #F8F8F8;
      font-size: 13px;
      font-weight: 500;
      color: #666;
      cursor: pointer;
      transition: all 0.2s;
    }
    .tab-btn.active {
      background: #E74C3C;
      border-color: #E74C3C;
      color: #FFF;
    }
    .tab-content {
      display: none;
    }
    .tab-content.active {
      display: block;
    }
    .search-box {
      background: #F8F8F8;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
    }
    .search-box label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #333;
      margin-bottom: 8px;
    }
    .search-box input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid #E0E0E0;
      border-radius: 10px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-box input:focus {
      border-color: #E74C3C;
    }
    .search-btn {
      width: 100%;
      padding: 12px;
      background: #E74C3C;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 12px;
      transition: background 0.2s;
    }
    .search-btn:hover {
      background: #C0392B;
    }
    .result-card {
      background: #FFFFFF;
      border: 1px solid #F0F0F0;
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.04);
    }
    .result-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }
    .avatar {
      width: 52px;
      height: 52px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      flex-shrink: 0;
      text-align: center;
      line-height: 1.2;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .result-meta {
      flex: 1;
      min-width: 0;
    }
    .result-name {
      font-size: 16px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 2px;
    }
    .result-desc {
      font-size: 12px;
      color: #888;
    }
    .group-badge {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 8px;
      font-weight: 600;
      display: inline-block;
      margin-top: 4px;
    }
    .destinations {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 12px;
    }
    .dest-tag {
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 10px;
      font-weight: 500;
    }
    .best { background: #E8F5E9; color: #2E7D32; }
    .good { background: #E3F2FD; color: #1565C0; }
    .caution { background: #FFF3E0; color: #E65100; }
    .avoid { background: #FFEBEE; color: #C62828; }
    .reason {
      font-size: 13px;
      color: #555;
      line-height: 1.7;
      background: #FAFAFA;
      padding: 12px;
      border-radius: 10px;
      border-left: 3px solid #FFB3B3;
    }
    .country-result {
      margin-bottom: 16px;
    }
    .country-title {
      font-size: 15px;
      font-weight: 600;
      color: #333;
      margin-bottom: 10px;
      padding-bottom: 8px;
      border-bottom: 1px dashed #E0E0E0;
    }
    .country-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .country-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px;
      background: #F8F8F8;
      border-radius: 10px;
    }
    .country-avatar {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      font-weight: 700;
      flex-shrink: 0;
    }
    .country-info {
      flex: 1;
    }
    .country-name {
      font-size: 14px;
      font-weight: 600;
      color: #333;
      margin-bottom: 2px;
    }
    .country-reason {
      font-size: 12px;
      color: #666;
      line-height: 1.5;
    }
    .legend {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 16px;
      justify-content: center;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      color: #666;
      background: #F8F8F8;
      padding: 4px 8px;
      border-radius: 12px;
    }
    .legend-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }
    .empty-result {
      text-align: center;
      padding: 40px 20px;
      color: #999;
    }
    .empty-result p {
      font-size: 14px;
      margin-top: 8px;
    }
    .footer {
      text-align: center;
      padding: 24px 0 12px;
      font-size: 11px;
      color: #BBB;
    }
    .country-intro {
      background: #F8F8F8;
      padding: 12px 16px;
      border-radius: 10px;
      margin-bottom: 16px;
      font-size: 13px;
      color: #666;
    }
    .country-detail-card {
      background: #FFFFFF;
      border: 1px solid #F0F0F0;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.04);
    }
    .detail-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px dashed #E0E0E0;
    }
    .detail-country {
      font-size: 20px;
      font-weight: 700;
      color: #333;
    }
    .detail-level {
      font-size: 12px;
      padding: 4px 12px;
      border-radius: 12px;
      font-weight: 600;
    }
    .detail-content {
      margin-bottom: 16px;
    }
    .detail-reason {
      font-size: 14px;
      color: #555;
      line-height: 1.8;
      margin-bottom: 12px;
    }
    .detail-desc {
      font-size: 14px;
      color: #888;
      margin-bottom: 12px;
    }
    .detail-tip {
      background: #FFF9E6;
      padding: 12px;
      border-radius: 10px;
      font-size: 13px;
      color: #666;
    }
    .detail-tip p {
      margin-bottom: 4px;
    }
    .back-btn {
      width: 100%;
      padding: 12px;
      background: #F8F8F8;
      color: #666;
      border: 1px solid #E0E0E0;
      border-radius: 10px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .back-btn:hover {
      background: #FFE5E5;
      border-color: #FFB3B3;
    }
    .section-title {
      font-size: 12px;
      font-weight: 600;
      color: #999;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    @media (min-width: 768px) {
      .container {
        max-width: 600px;
        margin: 20px auto;
        min-height: auto;
        border-radius: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="brand">小鱼碎碎念原创</div>
      <h1>🌍 留学目的地推荐</h1>
      <p>根据SBTI人格类型，找到最适合的留学国家</p>
    </div>

    <div class="tab-bar">
      <button class="tab-btn active" onclick="switchTab('sbti')">按人格查询</button>
      <button class="tab-btn" onclick="switchTab('country')">按国家查询</button>
    </div>

    <div id="sbti-tab" class="tab-content active">
      <div class="search-box">
        <label>输入你的SBTI人格（如：DEAD、MALO、BOSS）</label>
        <input type="text" id="sbti-input" placeholder="请输入SBTI代码..." maxlength="10">
        <button class="search-btn" onclick="searchBySbti()">查询</button>
      </div>
      <div id="sbti-result"></div>
    </div>

    <div id="country-tab" class="tab-content">
      <div class="search-box">
        <label>输入你想去的国家（如：美国、英国、澳大利亚）</label>
        <input type="text" id="country-input" placeholder="请输入国家名称...">
        <button class="search-btn" onclick="searchByCountry()">查询</button>
      </div>
      <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:#2E7D32;"></div>强烈推荐</div>
        <div class="legend-item"><div class="legend-dot" style="background:#1565C0;"></div>适合</div>
        <div class="legend-item"><div class="legend-dot" style="background:#E65100;"></div>谨慎考虑</div>
        <div class="legend-item"><div class="legend-dot" style="background:#C62828;"></div>不建议</div>
      </div>
      <div id="country-result"></div>
    </div>

    <div class="footer">
      <div class="brand">小鱼碎碎念原创</div>
      <p>SBTI 人格留学指南</p>
    </div>
  </div>

    function switchTab(tab) {
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
      if (tab === 'sbti') {
        document.querySelector('.tab-btn:nth-child(1)').classList.add('active');
        document.getElementById('sbti-tab').classList.add('active');
      } else {
        document.querySelector('.tab-btn:nth-child(2)').classList.add('active');
        document.getElementById('country-tab').classList.add('active');
      }
    }

    function getCountryReason(reason, country, level) {
      const sentences = reason.split('。');
      const relevant = sentences.filter(s => s.includes(country));
      if (relevant.length > 0) {
        return relevant.join('。') + '。';
      }
      if (level === 'best' || level === 'good') {
        return `该人格类型适合前往${country}留学。`;
      } else if (level === 'caution') {
        return `选择${country}需要谨慎考虑，做好充分准备。`;
      } else {
        return `该人格类型不太建议前往${country}留学。`;
      }
    }

    function searchBySbti() {
      const input = document.getElementById('sbti-input').value.trim().toUpperCase();
      const resultContainer = document.getElementById('sbti-result');

      if (!input) {
        resultContainer.innerHTML = '<div class="empty-result"><p>请输入SBTI代码</p></div>';
        return;
      }

      const person = data.find(d => d.id === input || d.name.includes(input));

      if (!person) {
        resultContainer.innerHTML = '<div class="empty-result"><p>未找到匹配的SBTI人格</p></div>';
        return;
      }

      const groupColors = {
        '摆烂躺平组': 'background:#D3D1C7;color:#444441',
        '情绪内耗组': 'background:#F5C4B3;color:#993C1D',
        '人间清醒组': 'background:#CED9F6;color:#3C3489',
        '社交个性组': 'background:#C0DD97;color:#27500A'
      };

      const clickableDest = [
        ...person.best.map(x => `<span class="dest-tag best" onclick="showCountryDetail('${x}', 'best')" style="cursor:pointer">${x} ★</span>`),
        ...person.good.map(x => `<span class="dest-tag good" onclick="showCountryDetail('${x}', 'good')" style="cursor:pointer">${x}</span>`),
        ...person.caution.map(x => `<span class="dest-tag caution" onclick="showCountryDetail('${x}', 'caution')" style="cursor:pointer">${x} ⚠</span>`),
        ...person.avoid.map(x => `<span class="dest-tag avoid" onclick="showCountryDetail('${x}', 'avoid')" style="cursor:pointer">${x} ✕</span>`)
      ].join('');

      resultContainer.innerHTML = `
        <div class="result-card">
          <div class="result-header">
            <div class="avatar" style="background:${person.color};color:${person.textColor}">${person.id}</div>
            <div class="result-meta">
              <div class="result-name">${person.name}</div>
              <div class="result-desc">${person.desc}</div>
              <span class="group-badge" style="${groupColors[person.group]}">${person.group}</span>
            </div>
          </div>
          <p class="section-title">推荐留学目的地（点击查看详情）</p>
          <div class="destinations">${clickableDest}</div>
        </div>
      `;
    }

    function showCountryDetail(country, level) {
      const resultContainer = document.getElementById('sbti-result');
      const person = data.find(d => {
        return d.best.includes(country) || d.good.includes(country) ||
               d.caution.includes(country) || d.avoid.includes(country);
      });

      const countryColors = {
        best: { bg: '#E8F5E9', text: '#2E7D32', label: '强烈推荐' },
        good: { bg: '#E3F2FD', text: '#1565C0', label: '适合' },
        caution: { bg: '#FFF3E0', text: '#E65100', label: '谨慎考虑' },
        avoid: { bg: '#FFEBEE', text: '#C62828', label: '不建议' }
      };

      const color = countryColors[level];
      const reason = getCountryReason(person.reason, country, level);

      resultContainer.innerHTML = `
        <div class="country-detail-card">
          <div class="detail-header">
            <span class="detail-country">${country}</span>
            <span class="detail-level" style="background:${color.bg};color:${color.text}">${color.label}</span>
          </div>
          <div class="detail-content">
            <p class="detail-reason">${reason}</p>
          </div>
          <button class="back-btn" onclick="searchBySbti()">← 返回上一页</button>
        </div>
      `;
    }

    function showPersonDetail(personId) {
      const resultContainer = document.getElementById('country-result');
      const person = data.find(d => d.id === personId);

      if (!person) return;

      const groupColors = {
        '摆烂躺平组': 'background:#D3D1C7;color:#444441',
        '情绪内耗组': 'background:#F5C4B3;color:#993C1D',
        '人间清醒组': 'background:#CED9F6;color:#3C3489',
        '社交个性组': 'background:#C0DD97;color:#27500A'
      };

      const allDest = [
        ...person.best.map(x => `<span class="dest-tag best">${x} ★</span>`),
        ...person.good.map(x => `<span class="dest-tag good">${x}</span>`),
        ...person.caution.map(x => `<span class="dest-tag caution">${x} ⚠</span>`),
        ...person.avoid.map(x => `<span class="dest-tag avoid">${x} ✕</span>`)
      ].join('');

      resultContainer.innerHTML = `
        <div class="country-detail-card">
          <div class="detail-header">
            <span class="detail-country">${person.name}</span>
            <span class="group-badge" style="${groupColors[person.group]}">${person.group}</span>
          </div>
          <div class="detail-content">
            <p class="detail-desc">${person.desc}</p>
            <p class="section-title">推荐留学目的地</p>
            <div class="destinations">${allDest}</div>
            <p class="detail-reason">${person.reason}</p>
          </div>
          <button class="back-btn" onclick="searchByCountry()">← 返回上一页</button>
        </div>
      `;
    }

    function searchByCountry() {
      const input = document.getElementById('country-input').value.trim();
      const resultContainer = document.getElementById('country-result');

      if (!input) {
        resultContainer.innerHTML = '<div class="empty-result"><p>请输入国家名称</p></div>';
        return;
      }

      const suitable = [];
      const caution = [];
      const avoid = [];

      data.forEach(person => {
        if (person.best.some(c => c.includes(input))) {
          suitable.push({ ...person, level: 'best' });
        } else if (person.good.some(c => c.includes(input))) {
          suitable.push({ ...person, level: 'good' });
        } else if (person.caution.some(c => c.includes(input))) {
          caution.push({ ...person, level: 'caution' });
        } else if (person.avoid.some(c => c.includes(input))) {
          avoid.push({ ...person, level: 'avoid' });
        }
      });

      if (suitable.length === 0 && caution.length === 0 && avoid.length === 0) {
        resultContainer.innerHTML = '<div class="empty-result"><p>未找到与该国家相关的人格数据</p></div>';
        return;
      }

      let html = `<div class="country-intro"><p>以下是 ${input} 适合和不适合的人格类型：</p></div>`;

      if (suitable.length > 0) {
        html += '<div class="country-result"><div class="country-title">✓ 推荐的人格类型（点击查看详情）</div><div class="country-list">';
        suitable.forEach(person => {
          const reason = getCountryReason(person.reason, input, person.level);
          html += `
            <div class="country-item" onclick="showPersonDetail('${person.id}')" style="cursor:pointer">
              <div class="country-avatar" style="background:${person.color};color:${person.textColor}">${person.id}</div>
              <div class="country-info">
                <div class="country-name">${person.name}</div>
                <div class="country-reason">${reason}</div>
              </div>
            </div>
          `;
        });
        html += '</div></div>';
      }

      if (caution.length > 0) {
        html += '<div class="country-result"><div class="country-title">⚠ 需谨慎的人格类型（点击查看详情）</div><div class="country-list">';
        caution.forEach(person => {
          const reason = getCountryReason(person.reason, input, person.level);
          html += `
            <div class="country-item" onclick="showPersonDetail('${person.id}')" style="cursor:pointer">
              <div class="country-avatar" style="background:${person.color};color:${person.textColor}">${person.id}</div>
              <div class="country-info">
                <div class="country-name">${person.name}</div>
                <div class="country-reason">${reason}</div>
              </div>
            </div>
          `;
        });
        html += '</div></div>';
      }

      if (avoid.length > 0) {
        html += '<div class="country-result"><div class="country-title">✕ 不建议的人格类型（点击查看详情）</div><div class="country-list">';
        avoid.forEach(person => {
          const reason = getCountryReason(person.reason, input, person.level);
          html += `
            <div class="country-item" onclick="showPersonDetail('${person.id}')" style="cursor:pointer">
              <div class="country-avatar" style="background:${person.color};color:${person.textColor}">${person.id}</div>
              <div class="country-info">
                <div class="country-name">${person.name}</div>
                <div class="country-reason">${reason}</div>
              </div>
            </div>
          `;
        });
        html += '</div></div>';
      }

      resultContainer.innerHTML = html;
    }

    document.getElementById('sbti-input').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') searchBySbti();
    });

    document.getElementById('country-input').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') searchByCountry();
    });
  </script>
