    --gray-dark: #666;
    --success: #2E7D32;
    --info: #1565C0;
    --warning: #E65100;
    --danger: #C62828;

    color: var(--dark);
    line-height: 1.6;
    padding: 16px;
  }
  /* 容器样式 */
  .container {
    width: 100%;
    max-width: 420px;
    margin: 0 auto;
    padding: 20px;
    background: #FFFFFF;
    border-radius: var(--radius-xl);
    box-shadow: var(--shadow-md);
  }

    .container {

      padding: 24px;
    }
  }
  @media (min-width: 1024px) {
    .container {

    }

    padding: 8px 0 20px;
    border-bottom: 2px solid #FFE5E5;
    margin-bottom: 20px;
  }
  .brand {
    display: inline-block;
    background: linear-gradient(135deg, var(--primary), var(--primary-light));
    color: white;
    padding: 6px 16px;
    border-radius: var(--radius-md);
    font-size: 12px;
    font-weight: 600;
    margin-bottom: 12px;
    box-shadow: 0 2px 8px rgba(255, 107, 107, 0.3);

    font-weight: 700;

    color: var(--gray);

    margin-bottom: 20px;

    font-size: 12px; 
    color: var(--gray-dark);
    background: var(--light);
    padding: 6px 12px;
    border-radius: var(--radius-sm);
  }
  .legend-dot { 
    width: 10px; 
    height: 10px; 
    border-radius: 50%;

  /* 筛选栏样式 */

    display: flex; 
    flex-wrap: wrap; 
    gap: 8px; 
    margin-bottom: 24px;
    justify-content: center;
  }
  .filter-btn { 
    background: var(--light); 
    border: 1px solid var(--gray-light); 
    border-radius: var(--radius-md); 
    padding: 8px 16px; 
    font-size: 13px; 
    cursor: pointer; 
    color: var(--gray-dark);
    font-weight: 500;

    background: var(--primary-dark); 
    border-color: var(--primary-dark); 
    color: #FFF; 
    font-weight: 600;
    box-shadow: 0 2px 8px rgba(231, 76, 60, 0.2);

    border-color: #FFCCCB;

    flex-direction: column;
    gap: 16px;

      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
    }

  .card { 
    background: #FFFFFF; 
    border: 1px solid var(--gray-light); 
    border-radius: var(--radius-lg); 
    padding: 20px;
    box-shadow: var(--shadow-sm);

    transform: translateY(-4px);

  }

    gap: 16px;

    display: inline-block;

    font-size: 14px;

    background: var(--light);
    padding: 14px;
    border-radius: var(--radius-md);
    border-left: 4px solid var(--primary-light);

    padding: 60px 20px;
    color: var(--gray);

// 初始化页面
document.addEventListener('DOMContentLoaded', function() {
  renderCards('all');
});

// 渲染卡片
function renderCards(filterGroup) {
  const container = document.getElementById('cards-container');
  container.innerHTML = '';
  
  // 筛选数据
  let filteredData = personalityData;
  if (filterGroup !== 'all') {
    filteredData = personalityData.filter(item => item.group === filterGroup);
  }
  
  // 处理空数据
  if (filteredData.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <p>暂无「${filterGroup}」相关的人格数据</p>
        <p style="margin-top:8px; font-size:13px;">可切换至「全部人格」查看更多内容</p>
      </div>
    `;
    return;
  }
  
  // 渲染卡片
  filteredData.forEach(item => {
    // 构建目的地标签
    let tagsHtml = '';
    // 强烈推荐
    item.best.forEach(tag => {
      tagsHtml += `<span class="dest-tag best">${tag}</span>`;
    });
    // 适合
    item.good.forEach(tag => {
      tagsHtml += `<span class="dest-tag good">${tag}</span>`;
    });
    // 谨慎考虑
    item.caution.forEach(tag => {
      tagsHtml += `<span class="dest-tag caution">${tag}</span>`;
    });
    // 不建议
    item.avoid.forEach(tag => {
      tagsHtml += `<span class="dest-tag avoid">${tag}</span>`;
    });
    
    // 构建分组徽章样式
    const groupBadgeStyle = `background: ${item.groupColor}; color: ${item.groupTextColor};`;
    
    // 创建卡片元素
    const cardHtml = `
      <div class="card">
        <div class="card-header">
          <div class="avatar" style="background: ${item.color}; color: ${item.textColor};">${item.id}</div>
          <div class="card-meta">
            <div class="card-name">${item.name}</div>
            <div class="card-desc">${item.desc}</div>
            <span class="group-badge" style="${groupBadgeStyle}">${item.group}</span>
          </div>
        </div>
        <div class="destinations">
          ${tagsHtml}
        </div>
        <div class="reason">${item.reason}</div>
      </div>
    `;
    
    container.innerHTML += cardHtml;
  });
}

// 筛选函数
function filter(group) {
  // 重置筛选按钮状态
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.classList.remove('active');
    if (btn.textContent.includes(group)) {
      btn.classList.add('active');
    }
  });
  
  // 渲染筛选后的卡片
  renderCards(group);
}
