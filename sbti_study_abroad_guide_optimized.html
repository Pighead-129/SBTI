  /* 全局样式重置与基础变量 */
  * {

    margin: 0; 
    padding: 0; 
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }
  :root {
    --primary: #FF6B6B;
    --primary-light: #FF8E8E;
    --primary-dark: #E74C3C;
    --secondary: #4ECDC4;
    --accent: #FFE66D;
    --dark: #2C3E50;
    --light: #FAFAFA;
    --gray: #95A5A6;
    --gray-light: #E0E0E0;
    --gray-dark: #666;
    --success: #2E7D32;
    --info: #1565C0;
    --warning: #E65100;
    --danger: #C62828;
    --shadow-sm: 0 2px 8px rgba(0,0,0,0.08);
    --shadow-md: 0 4px 16px rgba(0,0,0,0.12);
    --shadow-lg: 0 8px 24px rgba(0,0,0,0.16);
    --radius-sm: 8px;
    --radius-md: 12px;
    --radius-lg: 16px;
    --radius-xl: 20px;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
    background: linear-gradient(135deg, #FFF5F5 0%, #FFF9E6 100%);
    min-height: 100vh;
    color: var(--dark);
    line-height: 1.6;
    padding: 16px;
  }
  /* 容器样式 */
  .container {
    width: 100%;
    max-width: 420px;
    margin: 0 auto;
    padding: 20px;
    background: #FFFFFF;
    border-radius: var(--radius-xl);
    box-shadow: var(--shadow-md);
  }
  @media (min-width: 768px) {
    .container {
      max-width: 800px;
      padding: 24px;
    }
  }
  @media (min-width: 1024px) {
    .container {
      max-width: 900px;
    }
  }
  /* 头部样式 */
  .header {
    text-align: center;
    padding: 8px 0 20px;
    border-bottom: 2px solid #FFE5E5;
    margin-bottom: 20px;
  }
  .brand {
    display: inline-block;
    background: linear-gradient(135deg, var(--primary), var(--primary-light));
    color: white;
    padding: 6px 16px;
    border-radius: var(--radius-md);
    font-size: 12px;
    font-weight: 600;
    margin-bottom: 12px;
    box-shadow: 0 2px 8px rgba(255, 107, 107, 0.3);
  }
  .header h1 {
    font-size: 24px;
    font-weight: 700;
    color: var(--primary-dark);
    margin-bottom: 8px;
    letter-spacing: 0.5px;
  }
  .header p {
    font-size: 13px;
    color: var(--gray);
  }
  /* 图例样式 */
  .legend { 
    display: flex; 
    gap: 10px; 
    flex-wrap: wrap; 
    margin-bottom: 20px;
    justify-content: center;
  }
  .legend-item { 
    display: flex; 
    align-items: center; 
    gap: 5px; 
    font-size: 12px; 
    color: var(--gray-dark);
    background: var(--light);
    padding: 6px 12px;
    border-radius: var(--radius-sm);
  }
  .legend-dot { 
    width: 10px; 
    height: 10px; 
    border-radius: 50%; 
  }
  /* 筛选栏样式 */
  .filter-bar { 
    display: flex; 
    flex-wrap: wrap; 
    gap: 8px; 
    margin-bottom: 24px;
    justify-content: center;
  }
  .filter-btn { 
    background: var(--light); 
    border: 1px solid var(--gray-light); 
    border-radius: var(--radius-md); 
    padding: 8px 16px; 
    font-size: 13px; 
    cursor: pointer; 
    color: var(--gray-dark);
    font-weight: 500;
  }
  .filter-btn.active { 
    background: var(--primary-dark); 
    border-color: var(--primary-dark); 
    color: #FFF; 
    font-weight: 600;
    box-shadow: 0 2px 8px rgba(231, 76, 60, 0.2);
  }
  .filter-btn:hover:not(.active) { 
    background: #FFF5F5;
    border-color: #FFCCCB;
  }
  /* 卡片容器样式 */
  .cards {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  @media (min-width: 768px) {
    .cards {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
    }
  }
  /* 卡片样式 */
  .card { 
    background: #FFFFFF; 
    border: 1px solid var(--gray-light); 
    border-radius: var(--radius-lg); 
    padding: 20px;
    box-shadow: var(--shadow-sm);
  }
  .card:hover {
    transform: translateY(-4px);
    box-shadow: var(--shadow-md);
  }
  .card-header { 
    display: flex; 
    align-items: center; 
    gap: 16px; 
    margin-bottom: 16px; 
  }
  .avatar { 
    width: 56px; 
    height: 56px; 
    border-radius: var(--radius-md); 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    font-size: 12px; 
    font-weight: 700; 
    flex-shrink: 0; 
    text-align: center; 
    line-height: 1.3;
    box-shadow: var(--shadow-sm);
  }
  .card-meta { 
    flex: 1; 
    min-width: 0;
  }
  .card-name { 
    font-size: 18px; 
    font-weight: 700; 
    color: var(--dark);
    margin-bottom: 4px;
  }
  .card-desc { 
    font-size: 13px; 
    color: var(--gray);
    margin-bottom: 8px;
  }
  .group-badge { 
    font-size: 11px; 
    padding: 3px 10px; 
    border-radius: var(--radius-sm); 
    font-weight: 600; 
    display: inline-block;
  }
  /* 目的地标签样式 */
  .destinations { 
    display: flex; 
    flex-wrap: wrap; 
    gap: 8px; 
    margin-bottom: 16px;
  }
  .dest-tag { 
    font-size: 12px; 
    padding: 5px 12px; 
    border-radius: var(--radius-sm); 
    font-weight: 500;
  }
  .best { background: #E8F5E9; color: var(--success); }
  .good { background: #E3F2FD; color: var(--info); }
  .caution { background: #FFF3E0; color: var(--warning); }
  .avoid { background: #FFEBEE; color: var(--danger); }
  /* 理由说明样式 */
  .reason { 
    font-size: 14px; 
    color: var(--gray-dark); 
    line-height: 1.8; 
    background: var(--light);
    padding: 14px;
    border-radius: var(--radius-md);
    border-left: 4px solid var(--primary-light);
  }
  /* 空状态样式 */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--gray);
  }
  .empty-state p {
    font-size: 15px;
    margin-top: 12px;
  }
  /* 页脚样式 */
  .footer {
    text-align: center;
    padding: 30px 0 10px;
    font-size: 12px;
    color: var(--gray);
    grid-column: 1 / -1; /* 适配多列布局 */
  }
  /* 动画效果 */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .card {
    animation: fadeIn 0.3s ease;
  }
  /* 卡片点击效果 */
  .card {
    cursor: pointer;
    position: relative;
  }
  .card::after {
    content: '查看详情 →';
    position: absolute;
    bottom: 16px;
    right: 20px;
    font-size: 12px;
    color: var(--primary);
    font-weight: 500;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .card:hover::after {
    opacity: 1;
  }
  /* 详情弹窗样式 */
  .modal-overlay {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0, 0, 0, 0.5);
    z-index: 1000;
    justify-content: center;
    align-items: flex-start;
    padding: 20px;
    overflow-y: auto;
  }
  .modal-overlay.active {
    display: flex;
  }
  .modal-content {
    width: 100%;
    max-width: 500px;
    background: #FFFFFF;
    border-radius: var(--radius-xl);
    overflow: hidden;
    box-shadow: var(--shadow-lg);
    animation: slideUp 0.3s ease;
    position: relative;
    margin-top: 50px;
  }
  .modal-header {
    padding: 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: relative;
  }
  .modal-close {
    position: absolute;
    top: 16px;
    right: 16px;
    width: 32px;
    height: 32px;
    border: none;
    background: rgba(0,0,0,0.05);
    border-radius: 50%;
    font-size: 20px;
    cursor: pointer;
    color: var(--gray);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .modal-close:hover {
    background: rgba(0,0,0,0.1);
  }
  .modal-avatar {
    width: 72px;
    height: 72px;
    border-radius: var(--radius-lg);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    font-weight: 700;
    text-align: center;
    line-height: 1.3;
    box-shadow: var(--shadow-md);
  }
  .modal-title {
    font-size: 22px;
    font-weight: 700;
    color: var(--dark);
    margin-bottom: 4px;
  }
  .modal-desc {
    font-size: 14px;
    color: var(--gray);
    margin-bottom: 8px;
  }
  .modal-group {
    display: inline-block;
    font-size: 12px;
    padding: 4px 12px;
    border-radius: var(--radius-sm);
    font-weight: 600;
  }
  .modal-body {
    padding: 0 24px 24px;
  }
  .modal-section {
    margin-bottom: 20px;
  }
  .modal-section:last-child {
    margin-bottom: 0;
  }
  .section-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--dark);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title::before {
    content: '';
    width: 4px;
    height: 16px;
    background: var(--primary);
    border-radius: 2px;
  }
  .detail-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .detail-item {
    background: var(--light);
    padding: 12px;
    border-radius: var(--radius-md);
  }
  .detail-label {
    font-size: 12px;
    color: var(--gray);
    margin-bottom: 4px;
  }
  .detail-value {
    font-size: 14px;
    font-weight: 600;
    color: var(--dark);
  }
  .tag-list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .tag-item {
    font-size: 12px;
    padding: 5px 12px;
    border-radius: var(--radius-sm);
    font-weight: 500;
  }
  .section-text {
    font-size: 14px;
    color: var(--gray-dark);
    line-height: 1.8;
    background: var(--light);
    padding: 16px;
    border-radius: var(--radius-md);
    border-left: 4px solid var(--primary-light);
  }
  .character-list {
    list-style: none;
    padding: 0;
  }
  .character-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 0;
    border-bottom: 1px solid var(--gray-light);
  }
  .character-item:last-child {
    border-bottom: none;
  }
  .character-icon {
    width: 24px;
    height: 24px;
    background: var(--primary-light);
    color: white;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    flex-shrink: 0;
  }
  .character-text {
    font-size: 14px;
    color: var(--gray-dark);
  }
</style>
</head>

</div>

// 初始化页面
document.addEventListener('DOMContentLoaded', function() {
  renderCards('all');
});

// 渲染卡片
function renderCards(filterGroup) {
  const container = document.getElementById('cards-container');
  container.innerHTML = '';
  
  // 筛选数据
  let filteredData = personalityData;
  if (filterGroup !== 'all') {
    filteredData = personalityData.filter(item => item.group === filterGroup);
  }
  
  // 处理空数据
  if (filteredData.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <p>暂无「${filterGroup}」相关的人格数据</p>
        <p style="margin-top:8px; font-size:13px;">可切换至「全部人格」查看更多内容</p>
      </div>
    `;
    return;
  }
  
  // 渲染卡片
  filteredData.forEach(item => {
    // 构建目的地标签
    let tagsHtml = '';
    // 强烈推荐
    item.best.forEach(tag => {
      tagsHtml += `<span class="dest-tag best">${tag}</span>`;
    });
    // 适合
    item.good.forEach(tag => {
      tagsHtml += `<span class="dest-tag good">${tag}</span>`;
    });
    // 谨慎考虑
    item.caution.forEach(tag => {
      tagsHtml += `<span class="dest-tag caution">${tag}</span>`;
    });
    // 不建议
    item.avoid.forEach(tag => {
      tagsHtml += `<span class="dest-tag avoid">${tag}</span>`;
    });
    
    // 构建分组徽章样式
    const groupBadgeStyle = `background: ${item.groupColor}; color: ${item.groupTextColor};`;
    
    // 创建卡片元素
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="card-header">
        <div class="avatar" style="background: ${item.color}; color: ${item.textColor};">${item.id}</div>
        <div class="card-meta">
          <div class="card-name">${item.name}</div>
          <div class="card-desc">${item.desc}</div>
          <span class="group-badge" style="${groupBadgeStyle}">${item.group}</span>
        </div>
      </div>
      <div class="destinations">
        ${tagsHtml}
      </div>
      <div class="reason">${item.reason}</div>
    `;
    
    // 使用addEventListener绑定点击事件，避免特殊字符问题
    card.addEventListener('click', function() {
      openModal(item.id);
    });
    
    container.appendChild(card);
  });
}

// 筛选函数
function filter(group) {
  // 重置筛选按钮状态
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.classList.remove('active');
    if (btn.textContent.includes(group)) {
      btn.classList.add('active');
    }
  });
  
  // 渲染筛选后的卡片
  renderCards(group);
}

// 打开详情弹窗

  // 设置弹窗头部

  document.getElementById('modal-title').textContent = item.name;
  document.getElementById('modal-desc').textContent = item.desc;
  document.getElementById('modal-group').style.cssText = `background: ${item.groupColor}; color: ${item.groupTextColor};`;
  document.getElementById('modal-group').textContent = item.group;
  
  // 设置弹窗内容
  const bodyHtml = `
    <div class="modal-section">
      <div class="section-title">性格特点</div>
      <ul class="character-list">
        ${item.personality.map(p => `<li class="character-item"><span class="character-icon">✓</span><span class="character-text">${p}</span></li>`).join('')}

    </div>
    
    <div class="modal-section">

    </div>

      <div class="section-text">${item.lifeTips}</div>
    </div>

    </div>
    
    <div class="modal-section">
      <div class="section-title">适合专业</div>
      <div class="tag-list">
        ${item.majors.map(m => `<span class="tag-item good">${m}</span>`).join('')}
      </div>
    </div>
    
    <div class="modal-section">
      <div class="section-title">有趣小知识</div>
      <div class="section-text">${item.funFact}</div>
    </div>
    
    <div class="modal-section">
      <div class="section-title">推荐目的地</div>
      <div class="detail-grid">
        <div class="detail-item">
          <div class="detail-label">强烈推荐</div>
          <div class="detail-value" style="color: ${getComputedStyle(document.documentElement).getPropertyValue('--success')};">${item.best.join('、')}</div>
        </div>
        <div class="detail-item">
          <div class="detail-label">适合</div>
          <div class="detail-value" style="color: ${getComputedStyle(document.documentElement).getPropertyValue('--info')};">${item.good.join('、')}</div>
        </div>
        <div class="detail-item">
          <div class="detail-label">谨慎考虑</div>
          <div class="detail-value" style="color: ${getComputedStyle(document.documentElement).getPropertyValue('--warning')};">${item.caution.join('、')}</div>

          <div class="detail-value" style="color: ${getComputedStyle(document.documentElement).getPropertyValue('--danger')};">${item.avoid.join('、')}</div>
        </div>
      </div>
    </div>
    
    <div class="modal-section">
      <div class="section-title">匹配理由</div>
      <div class="section-text">${item.reason}</div>
    </div>
  `;
  
  document.getElementById('modal-body').innerHTML = bodyHtml;
  document.getElementById('detail-modal').classList.add('active');
  document.body.style.overflow = 'hidden';
}

// 关闭详情弹窗
function closeModal() {
  document.getElementById('detail-modal').classList.remove('active');
  document.body.style.overflow = '';
}

// 点击弹窗外部关闭
document.getElementById('detail-modal').addEventListener('click', function(e) {
  if (e.target === this) {
    closeModal();
  }
});
